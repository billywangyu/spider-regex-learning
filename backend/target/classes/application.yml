spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/learning_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:wangyu}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
server:
  port: ${PORT:8080}